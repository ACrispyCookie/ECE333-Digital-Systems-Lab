<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1720" viewBox="0 0 1200 1720" role="img" aria-labelledby="title desc">
  <title id="title">ECE333 lab progression</title>
  <desc id="desc">Mobile-friendly stacked overview of ECE333 labs from seven-segment displays to UART, VGA graphics, and accelerometer-controlled VGA sprites.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#172554"/></linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/></filter>
    <style>
      .title{font:800 46px Inter,Segoe UI,sans-serif;fill:#e0f2fe}.sub{font:500 24px Inter,Segoe UI,sans-serif;fill:#bfdbfe}
      .card{rx:28;fill:#0f172a;stroke:#334155;stroke-width:2.5;filter:url(#shadow)}
      .num{font:800 22px Inter,Segoe UI,sans-serif;fill:#0f172a}.numBg{fill:#67e8f9}.lab{font:800 32px Inter,Segoe UI,sans-serif;fill:#f8fafc}.body{font:500 24px Inter,Segoe UI,sans-serif;fill:#cbd5e1}.small{font:500 20px Inter,Segoe UI,sans-serif;fill:#94a3b8}
      .pill{rx:13}.pillText{font:800 16px Inter,Segoe UI,sans-serif;fill:#0f172a}.display{fill:#67e8f9}.uart{fill:#86efac}.vga{fill:#fb7185}.sensor{fill:#a78bfa}.chev{fill:#67e8f9}.screen{fill:#020617;stroke:#60a5fa;stroke-width:5}.sprite{fill:#facc15;stroke:#fde68a;stroke-width:3}.icon{font:800 56px Inter,Segoe UI,sans-serif;fill:#fef3c7}.line{stroke:#67e8f9;stroke-width:8;stroke-linecap:round}
    </style>
  </defs>
  <rect width="1200" height="1720" fill="url(#bg)"/>
  <path d="M0 1555 C210 1500 365 1625 610 1562 C800 1515 980 1582 1200 1518 L1200 1720 L0 1720 Z" fill="#0f766e" opacity=".16"/>

  <text x="60" y="74" class="title">ECE333 Digital Systems Lab</text>
  <text x="62" y="118" class="sub">Four Verilog labs on Nexys A7</text>
  <text x="62" y="151" class="sub">from display logic to sensor-driven graphics</text>

  <g transform="translate(60,210)">
    <rect width="1080" height="255" class="card"/>
    <circle cx="52" cy="55" r="28" class="numBg"/><text x="52" y="63" text-anchor="middle" class="num">1</text>
    <text x="95" y="64" class="lab">Seven-segment display systems</text>
    <text x="95" y="112" class="body">LED decoder, four-digit multiplexing,</text>
    <text x="95" y="146" class="body">debouncers, counters, and constraints.</text>
    <text x="95" y="190" class="small">Reusable stable board I/O blocks for later labs.</text>
    <text x="790" y="142" text-anchor="middle" class="icon">8.8.8.8</text>
    <rect x="895" y="86" width="130" height="38" class="pill display"/><text x="960" y="112" text-anchor="middle" class="pillText">DISPLAY</text>
    <rect x="895" y="142" width="130" height="38" class="pill sensor"/><text x="960" y="168" text-anchor="middle" class="pillText">FPGA I/O</text>
  </g>
  <path d="M562 506 h76 l-38 50 z" class="chev"/>

  <g transform="translate(60,590)">
    <rect width="1080" height="255" class="card"/>
    <circle cx="52" cy="55" r="28" class="numBg"/><text x="52" y="63" text-anchor="middle" class="num">2</text>
    <text x="95" y="64" class="lab">UART communication pipeline</text>
    <text x="95" y="112" class="body">Baud controller, TX/RX FSMs,</text>
    <text x="95" y="146" class="body">parity/framing tests, and buffering.</text>
    <text x="95" y="190" class="small">Optional received-message display path.</text>
    <circle cx="790" cy="125" r="38" fill="#1e293b" stroke="#67e8f9" stroke-width="5"/><text x="790" y="134" text-anchor="middle" class="body">TX</text>
    <line x1="830" y1="125" x2="930" y2="125" class="line"/>
    <circle cx="970" cy="125" r="38" fill="#1e293b" stroke="#67e8f9" stroke-width="5"/><text x="970" y="134" text-anchor="middle" class="body">RX</text>
    <rect x="870" y="180" width="120" height="38" class="pill uart"/><text x="930" y="206" text-anchor="middle" class="pillText">UART</text>
  </g>
  <path d="M562 886 h76 l-38 50 z" class="chev"/>

  <g transform="translate(60,970)">
    <rect width="1080" height="255" class="card"/>
    <circle cx="52" cy="55" r="28" class="numBg"/><text x="52" y="63" text-anchor="middle" class="num">3</text>
    <text x="95" y="64" class="lab">VGA graphics and sprite rendering</text>
    <text x="95" y="112" class="body">VGA timing, pixel addressing,</text>
    <text x="95" y="146" class="body">RGB VRAM, and sprite animation.</text>
    <text x="95" y="190" class="small">Generated memory contents become board video output.</text>
    <rect x="700" y="58" width="215" height="130" rx="14" class="screen"/>
    <rect x="732" y="88" width="152" height="72" fill="#1d4ed8"/>
    <circle cx="778" cy="124" r="21" fill="#facc15"/><path d="M828 160 L864 104 L897 166 Z" fill="#22c55e"/>
    <rect x="942" y="76" width="88" height="38" class="pill vga"/><text x="986" y="102" text-anchor="middle" class="pillText">VGA</text>
    <rect x="942" y="132" width="88" height="38" class="pill uart"/><text x="986" y="158" text-anchor="middle" class="pillText">VRAM</text>
  </g>
  <path d="M562 1266 h76 l-38 50 z" class="chev"/>

  <g transform="translate(60,1350)">
    <rect width="1080" height="255" class="card"/>
    <circle cx="52" cy="55" r="28" class="numBg"/><text x="52" y="63" text-anchor="middle" class="num">4</text>
    <text x="95" y="64" class="lab">SPI accelerometer to VGA sprite</text>
    <text x="95" y="112" class="body">Sensor readings feed command/value logic,</text>
    <text x="95" y="146" class="body">then drive the reused VGA sprite pipeline.</text>
    <text x="95" y="190" class="small">Live motion becomes visible graphics movement.</text>
    <rect x="700" y="74" width="88" height="88" rx="14" fill="#111827" stroke="#fb7185" stroke-width="5"/><text x="744" y="132" text-anchor="middle" class="icon">↕</text>
    <path d="M828 88 l48 30 l-48 30 z" class="chev"/>
    <rect x="916" y="76" width="86" height="86" rx="12" fill="#1d4ed8" stroke="#93c5fd" stroke-width="4"/><circle cx="959" cy="119" r="18" fill="#facc15"/>
    <rect x="820" y="178" width="78" height="38" class="pill vga"/><text x="859" y="204" text-anchor="middle" class="pillText">SPI</text>
    <rect x="922" y="178" width="100" height="38" class="pill display"/><text x="972" y="204" text-anchor="middle" class="pillText">SENSOR</text>
  </g>
</svg>
