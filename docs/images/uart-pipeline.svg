<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" role="img" aria-labelledby="title desc">
  <title id="title">Lab 2 UART pipeline</title>
  <desc id="desc">Lab 2 UART transmitter, receiver, message memory, and optional seven-segment display path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#16213e"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".3"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/></marker>
    <style>
      .title{font:800 44px Inter,Segoe UI,sans-serif;fill:#e0f2fe}.sub{font:500 22px Inter,Segoe UI,sans-serif;fill:#bfdbfe}
      .box{rx:22;fill:#0f172a;stroke:#334155;stroke-width:2.4;filter:url(#shadow)}.block{rx:16;fill:#11283b;stroke:#38bdf8;stroke-width:2.4}.fsm{rx:16;fill:#2b1f3a;stroke:#c084fc;stroke-width:2.4}.mem{rx:16;fill:#1b2d22;stroke:#86efac;stroke-width:2.4}.display{rx:16;fill:#3a2615;stroke:#fbbf24;stroke-width:2.4}
      .head{font:800 24px Inter,Segoe UI,sans-serif;fill:#f8fafc}.txt{font:500 18px Inter,Segoe UI,sans-serif;fill:#cbd5e1}.small{font:700 14px Inter,Segoe UI,sans-serif;fill:#e2e8f0}.wire{stroke:#67e8f9;stroke-width:4;fill:none;marker-end:url(#arrow)}.serial{stroke:#f472b6;stroke-width:5;stroke-dasharray:12 8;fill:none;marker-end:url(#arrow)}.bit{rx:5;fill:#fef3c7;stroke:#f59e0b;stroke-width:1.5}.bittext{font:800 15px ui-monospace,Consolas,monospace;fill:#0f172a}.caption{font:600 16px Inter,Segoe UI,sans-serif;fill:#93c5fd}
    </style>
  </defs>
  <rect width="1500" height="820" fill="url(#bg)"/>
  <text x="70" y="72" class="title">Lab 2 · UART communication pipeline</text>
  <text x="72" y="112" class="sub">Baud-rate timing, transmitter/receiver FSMs, parity/framing checks, buffering, and seven-segment display integration</text>

  <rect x="70" y="160" width="1360" height="560" class="box"/>

  <g transform="translate(120,220)">
    <rect width="210" height="105" class="block"/><text x="105" y="43" text-anchor="middle" class="head">Baud controller</text><text x="105" y="76" text-anchor="middle" class="txt">8 selectable rates</text>
  </g>
  <path d="M330 272 H410" class="wire"/>
  <g transform="translate(430,205)">
    <rect width="240" height="135" class="fsm"/><text x="120" y="42" text-anchor="middle" class="head">Transmitter FSM</text><text x="120" y="75" text-anchor="middle" class="txt">start · data bits</text><text x="120" y="103" text-anchor="middle" class="txt">parity · stop</text>
  </g>
  <path d="M670 272 H755" class="serial"/>

  <g transform="translate(770,230)">
    <rect x="0" y="0" width="42" height="42" class="bit"/><text x="21" y="27" text-anchor="middle" class="bittext">S</text>
    <rect x="48" y="0" width="42" height="42" class="bit"/><text x="69" y="27" text-anchor="middle" class="bittext">D0</text>
    <rect x="96" y="0" width="42" height="42" class="bit"/><text x="117" y="27" text-anchor="middle" class="bittext">D1</text>
    <rect x="144" y="0" width="42" height="42" class="bit"/><text x="165" y="27" text-anchor="middle" class="bittext">…</text>
    <rect x="192" y="0" width="42" height="42" class="bit"/><text x="213" y="27" text-anchor="middle" class="bittext">P</text>
    <rect x="240" y="0" width="42" height="42" class="bit"/><text x="261" y="27" text-anchor="middle" class="bittext">T</text>
    <text x="141" y="75" text-anchor="middle" class="caption">serial UART frame</text>
  </g>
  <path d="M1065 272 H1135" class="serial"/>

  <g transform="translate(1155,205)">
    <rect width="220" height="135" class="fsm"/><text x="110" y="42" text-anchor="middle" class="head">Receiver FSM</text><text x="110" y="75" text-anchor="middle" class="txt">16× sampling</text><text x="110" y="103" text-anchor="middle" class="txt">parity/framing flags</text>
  </g>

  <path d="M1265 340 V435" class="wire"/>
  <g transform="translate(1140,455)">
    <rect width="250" height="115" class="mem"/><text x="125" y="43" text-anchor="middle" class="head">Receiver memory</text><text x="125" y="77" text-anchor="middle" class="txt">message buffer</text>
  </g>
  <path d="M1140 512 H1010" class="wire"/>
  <g transform="translate(730,455)">
    <rect width="260" height="115" class="mem"/><text x="130" y="43" text-anchor="middle" class="head">UART controller</text><text x="130" y="77" text-anchor="middle" class="txt">message counter + routing</text>
  </g>
  <path d="M730 512 H610" class="wire"/>
  <g transform="translate(355,455)">
    <rect width="235" height="115" class="display"/><text x="118" y="43" text-anchor="middle" class="head">LED connector</text><text x="118" y="77" text-anchor="middle" class="txt">received text display</text>
  </g>
  <path d="M355 512 H250" class="wire"/>
  <g transform="translate(125,455)">
    <rect width="110" height="115" class="display"/><text x="55" y="48" text-anchor="middle" class="head">7-seg</text><text x="55" y="80" text-anchor="middle" class="txt">output</text>
  </g>

  <text x="120" y="662" class="caption">The same Lab 2 building blocks support stand-alone TX/RX tests and the optional UART-to-seven-segment display path.</text>
</svg>
